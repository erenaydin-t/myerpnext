name: Build and Publish ERPNext Image

on:
  push:
    branches: [ "main" ]
    # Only rebuild when something that actually affects the image changes:
    #   - Dockerfile      : the image recipe / installed apps changed
    #   - base-image.txt  : a new upstream ERPNext version was requested
    # Pushes that only touch docs, compose, scripts, etc. do NOT rebuild.
    paths:
      - "Dockerfile"
      - "base-image.txt"
  # Manual trigger — use this to force a rebuild (e.g. to pick up upstream
  # patches on a rolling tag without editing base-image.txt).
  workflow_dispatch:
    inputs:
      no_cache:
        description: "Build with no cache (re-clone every app, full rebuild). Use to pick up custom-app commits without bumping APPS_CACHE_BUST."
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # BASE_IMAGE is read from base-image.txt at runtime (see the step below).

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------
      # Resolve the ERPNext base image from base-image.txt (first
      # non-comment line). Editing that file is the supported way to
      # build a new ERPNext version. Sets BASE_IMAGE for all later steps.
      # -----------------------------------------------------------------
      - name: Read base image from base-image.txt
        run: |
          set -euo pipefail
          BASE_IMAGE="$(grep -vE '^[[:space:]]*#' base-image.txt | grep -vE '^[[:space:]]*$' | head -n1 | tr -d '[:space:]')"
          if [ -z "${BASE_IMAGE}" ]; then
            echo "::error::base-image.txt has no usable image reference"
            exit 1
          fi
          echo "Base image: ${BASE_IMAGE}"
          echo "BASE_IMAGE=${BASE_IMAGE}" >> "${GITHUB_ENV}"

      # -----------------------------------------------------------------
      # Pre-flight: verify every app repo + branch in apps.json is
      # reachable BEFORE we burn time pulling the base image. Fails the
      # job with a clear list of repos that disappeared or went private.
      # If a repo went private, configure a PAT secret named
      # APPS_GITHUB_TOKEN and uncomment the git config block below.
      # -----------------------------------------------------------------
      - name: Verify app repository access
        run: |
          set -euo pipefail

          # Uncomment if any app repo goes private and a PAT is configured:
          # git config --global url."https://x-access-token:${{ secrets.APPS_GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

          FAILED=()
          while IFS=$'\t' read -r url branch; do
            target="HEAD"
            [ -n "${branch}" ] && target="refs/heads/${branch}"
            if ! git ls-remote --exit-code "${url}" "${target}" >/dev/null 2>&1; then
              FAILED+=("${url} (${branch:-default})")
            fi
          done < <(jq -r '.[] | [.url, (.branch // "")] | @tsv' apps.json)

          if [ ${#FAILED[@]} -ne 0 ]; then
            {
              echo "::error::One or more app repositories are not accessible:"
              printf '  - %s\n' "${FAILED[@]}"
              echo ""
              echo "The repo was deleted/renamed, the branch is gone, or the repo went private."
              echo "If private, configure secrets.APPS_GITHUB_TOKEN and enable the git config line in this step."
            } | tee -a "${GITHUB_STEP_SUMMARY}"
            exit 1
          fi
          echo "All app repositories accessible."

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # -----------------------------------------------------------------
      # Resolve the exact ERPNext semantic version from the base image.
      # ERPNext stores its version in apps/erpnext/erpnext/__init__.py
      # as: __version__ = "16.x.y"
      # -----------------------------------------------------------------
      - name: Resolve ERPNext version from base image
        id: erpnext
        run: |
          set -euo pipefail

          echo "Pulling ${BASE_IMAGE} ..."
          docker pull "${BASE_IMAGE}"

          RAW=$(docker run --rm --entrypoint cat "${BASE_IMAGE}" \
                  /home/frappe/frappe-bench/apps/erpnext/erpnext/__init__.py \
                | grep -E '^__version__' | head -n1)

          # Extract the quoted version string. Handles single or double quotes.
          VERSION=$(echo "${RAW}" | sed -E "s/.*['\"]([^'\"]+)['\"].*/\1/")

          if [ -z "${VERSION}" ]; then
            echo "::error::Could not parse ERPNext version from ${BASE_IMAGE}"
            echo "Raw line was: ${RAW}"
            exit 1
          fi

          # Normalise: strip any leading 'v' so we control the prefix
          VERSION="${VERSION#v}"

          echo "Resolved ERPNext version: v${VERSION}"
          echo "version=v${VERSION}"          >> "${GITHUB_OUTPUT}"
          echo "version_bare=${VERSION}"      >> "${GITHUB_OUTPUT}"

          # Major branch tag, e.g. v16
          MAJOR=$(echo "${VERSION}" | cut -d. -f1)
          echo "major=v${MAJOR}"              >> "${GITHUB_OUTPUT}"

      - name: Generate Docker tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.erpnext.outputs.version }}
            type=raw,value=${{ steps.erpnext.outputs.major }}-latest
            type=raw,value=${{ steps.erpnext.outputs.major }}-{{date 'YYYYMMDD'}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.version=${{ steps.erpnext.outputs.version }}
            io.frappe.erpnext.version=${{ steps.erpnext.outputs.version }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          pull: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_IMAGE=${{ env.BASE_IMAGE }}
            ERPNEXT_VERSION=${{ steps.erpnext.outputs.version }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
            VCS_REF=${{ github.sha }}
          no-cache: ${{ github.event_name == 'workflow_dispatch' && inputs.no_cache }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Job summary
        run: |
          {
            echo "### ERPNext image published"
            echo ""
            echo "- **ERPNext version:** \`${{ steps.erpnext.outputs.version }}\`"
            echo "- **Base image:** \`${{ env.BASE_IMAGE }}\`"
            echo ""
            echo "**Tags pushed to GHCR:**"
            echo ""
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"
